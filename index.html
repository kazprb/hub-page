<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>HydeyTools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HydeyTools — 配信者向けの便利ツール一覧" />
    <link rel="icon" href="../hydey_favicon.png" type="image/png" />
    <style>
      :root {
        --bg: #f4f5f8;
        --card-bg: #ffffff;
        --text-main: #1a1a2e;
        --text-sub: #555;
        --border: #dde0e6;
        --accent: #3a7bd5;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text-main);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      .hero {
        text-align: center;
        padding: 56px 16px 40px;
      }
      .hero img {
        height: 48px;
        margin-bottom: 12px;
      }
      .hero p {
        color: var(--text-sub);
        font-size: 15px;
      }

      /* ── Cards ── */
      .tools {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 16px 64px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }
      .tool-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.2s, transform 0.2s;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .tool-card:hover {
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        transform: translateY(-2px);
      }
      .tool-card h2 {
        font-size: 18px;
        font-weight: 700;
      }
      .tool-card .desc {
        font-size: 14px;
        color: var(--text-sub);
        line-height: 1.6;
        flex: 1;
      }
      .tool-card .benefits {
        list-style: none;
        padding: 0;
        margin-top: 4px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tool-card .benefits li {
        font-size: 13px;
        color: var(--text-sub);
        line-height: 1.5;
      }
      .tool-card .benefits li::before {
        content: "\2714\0020";
        color: #3a7bd5;
      }

      /* ── Footer ── */
      footer {
        margin-top: auto;
        text-align: center;
        padding: 24px 16px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>

    <div class="hero">
      <img src="../hydeytools-logo.png" alt="HydeyTools" />
      <p>配信をもっと楽しくする、便利ツール集</p>
    </div>

    <div class="tools">

      <a class="tool-card" href="https://gacha.hydeylab.com/create">
        <h2>Live Gacha</h2>
        <p class="desc">ライブ配信向けリアルタイムガチャシステム。視聴者全員で3Dフリップ演出・確定演出・紙吹雪を共有できます。</p>
        <ul class="benefits">
          <li>URL共有だけでリスナー全員がリアルタイム参加</li>
          <li>確定演出で"当たりの瞬間"みんなで盛り上がれる</li>
          <li>当選者にそのまま景品を配布できる</li>
        </ul>
      </a>

      <a class="tool-card" href="./panel-opener/">
        <h2>パネル開けツール</h2>
        <p class="desc">IRIAMライバー向けの配信補助ツール。パネルの管理・表示をかんたんに行えます。</p>
        <ul class="benefits">
          <li>イラストのお披露目に</li>
          <li>可愛いパネルをかんたん作成</li>
          <li>進捗をXでかんたんシェア</li>
          <li>ラベル・イラストでデコれる</li>
        </ul>
      </a>

    </div>

    <footer>&copy; HydeyTools</footer>

  </body>
</html>
